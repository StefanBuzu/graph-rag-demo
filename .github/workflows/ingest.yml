name: Ingest & Generate Report

on:
  push:
    branches: [master]

jobs:
  ingest-and-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Inject backend URL into frontend
        run: sed -i 's|__BACKEND_URL__|${{ secrets.BACKEND_URL }}|g' docs/index.html

      - name: Restore dependencies
        run: dotnet restore

      - name: Ingest document into Neo4j Aura
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: dotnet run -- --ingest

      - name: Generate governance report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: dotnet run -- --report

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add governance-report.md docs/index.html
          git diff --staged --quiet || (git commit -m "chore: update report and inject backend URL [skip ci]" && git push)

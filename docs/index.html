<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speedy GraphRAG Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #0070f3;
      color: white;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,112,243,0.3);
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }

    .tabs { display: flex; gap: 0.25rem; }

    .tab-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.85);
      padding: 0.35rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
    }

    .tab-btn:hover { border-color: white; color: white; }
    .tab-btn.active { background: white; color: #0070f3; border-color: white; }

    .config-bar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .config-bar label { font-size: 0.8rem; color: #6b7280; white-space: nowrap; font-weight: 500; }

    .config-bar input {
      flex: 1;
      max-width: 420px;
      padding: 0.4rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .config-bar input:focus { border-color: #0070f3; }

    .status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: #6b7280; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; transition: background 0.3s; }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }

    .main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    .panel { display: none; flex-direction: column; }
    .panel.active { display: flex; }

    /* ── Chat ── */
    #messages {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.5rem;
      min-height: 420px;
      max-height: 480px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .msg {
      max-width: 78%;
      padding: 0.7rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.user {
      background: #0070f3;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant {
      background: #f3f4f6;
      color: #111;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }

    .msg.thinking {
      background: #f9fafb;
      color: #9ca3af;
      align-self: flex-start;
      font-style: italic;
      font-size: 0.85rem;
      border: 1px dashed #e5e7eb;
    }

    .chat-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.875rem;
    }

    .chat-form input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .chat-form input:focus { border-color: #0070f3; }

    .chat-form button {
      padding: 0.75rem 1.5rem;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .chat-form button:hover:not(:disabled) { background: #005ed1; }
    .chat-form button:disabled { background: #9ca3af; cursor: not-allowed; }

    /* ── Report ── */
    .report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .report-header h2 { font-size: 1rem; font-weight: 600; color: #374151; }

    .gen-btn {
      padding: 0.5rem 1.25rem;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .gen-btn:hover:not(:disabled) { background: #005ed1; }
    .gen-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #report-content {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 2rem;
      min-height: 420px;
      font-size: 0.9rem;
      line-height: 1.75;
    }

    #report-content h1, #report-content h2, #report-content h3 {
      margin: 1.5rem 0 0.6rem;
      color: #111827;
      font-weight: 600;
    }

    #report-content h1 { font-size: 1.25rem; }
    #report-content h2 { font-size: 1.05rem; }
    #report-content p { margin-bottom: 0.75rem; color: #374151; }
    #report-content ul, #report-content ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    #report-content li { margin-bottom: 0.3rem; color: #374151; }
    #report-content strong { color: #111827; }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: #9ca3af;
      font-size: 0.9rem;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Speedy GraphRAG Assistant</h1>
  <div class="tabs">
    <button class="tab-btn active" id="tab-chat" onclick="showTab('chat', this)">Chat</button>
    <button class="tab-btn" id="tab-report" onclick="showTab('report', this)">Governance Report</button>
  </div>
</header>

<div class="config-bar">
  <label for="backendUrl">Backend URL</label>
  <input id="backendUrl" type="text" placeholder="https://your-app.onrender.com" />
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">not connected</span>
  </div>
</div>

<div class="main">

  <div id="panel-chat" class="panel active">
    <div id="messages">
      <div class="msg assistant">
        Hi! I'm the Speedy Knowledge Assistant. Ask me anything about Speedy's systems, infrastructure, or organisation.
      </div>
    </div>
    <form class="chat-form" onsubmit="sendMessage(event)">
      <input id="questionInput" type="text" placeholder="e.g. What systems does Speedy use?" autocomplete="off" />
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

  <div id="panel-report" class="panel">
    <div class="report-header">
      <h2>Governance Report</h2>
      <button class="gen-btn" id="genBtn" onclick="loadReport()">Generate Report</button>
    </div>
    <div id="report-content">
      <div class="placeholder">Click "Generate Report" to create a governance analysis from the knowledge graph.</div>
    </div>
  </div>

</div>

<script>
  function showTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function getUrl() {
    return document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  }

  async function checkHealth() {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('statusText');
    const url = getUrl();
    if (!url) { dot.className = 'dot'; txt.textContent = 'not connected'; return; }
    try {
      const res = await fetch(url + '/health', { signal: AbortSignal.timeout(4000) });
      if (res.ok) { dot.className = 'dot ok'; txt.textContent = 'connected'; }
      else        { dot.className = 'dot err'; txt.textContent = 'error'; }
    } catch {
      dot.className = 'dot err'; txt.textContent = 'unreachable';
    }
  }

  document.getElementById('backendUrl').addEventListener('change', checkHealth);
  document.getElementById('backendUrl').addEventListener('blur', checkHealth);

  function appendMessage(text, role) {
    const box = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.textContent = text;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    return el;
  }

  async function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('questionInput');
    const btn   = document.getElementById('sendBtn');
    const q     = input.value.trim();
    if (!q) return;

    const url = getUrl();
    if (!url) { alert('Enter the backend URL above first.'); return; }

    appendMessage(q, 'user');
    input.value = '';
    btn.disabled = true;

    const thinking = appendMessage('Thinking…', 'thinking');

    try {
      const res = await fetch(url + '/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      thinking.remove();
      appendMessage(data.answer, 'assistant');
    } catch {
      thinking.remove();
      appendMessage('Could not reach the backend. Check the URL and try again.', 'assistant');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  async function loadReport() {
    const url = getUrl();
    if (!url) { alert('Enter the backend URL above first.'); return; }

    const btn     = document.getElementById('genBtn');
    const content = document.getElementById('report-content');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating…';
    content.innerHTML = '<div class="placeholder">Querying knowledge graph and generating report…</div>';

    try {
      const res  = await fetch(url + '/api/report');
      const data = await res.json();
      content.innerHTML = marked.parse(data.content);
    } catch {
      content.innerHTML = '<div class="placeholder">Could not load the report. Is the backend running?</div>';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Regenerate';
    }
  }
</script>

</body>
</html>
